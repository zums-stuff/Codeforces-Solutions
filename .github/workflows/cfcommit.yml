name: CFCommit

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: '0 */1 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    
    # ESTA SECCIÓN ES LA CLAVE PARA CORREGIR EL ERROR 128
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run Updater Script
        run: |
          python ./.github/scripts/updater.py ${{ secrets.CF_USER_NAME }}

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          # El siguiente comando solo intentará hacer commit si hay cambios.
          # Si no hay cambios, no dará error y el workflow terminará exitosamente.
          if ! git diff-index --quiet HEAD; then
            git commit -m "feat: ✨ Sync Codeforces solutions"
            git push
          else
            echo "No new solutions to commit."
          fi
