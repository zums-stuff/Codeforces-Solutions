name: CFCommit

on:
  push:
    branches: [ "main" ] # O tu rama principal
  workflow_dispatch:
  schedule:
    - cron: '0 */1 * * *' # Se ejecuta cada hora

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run updater
      run: |
        python ./.github/scripts/updater.py ${{ secrets.CF_USER_NAME }} ${{ secrets.GH_TOKEN }}
        
    - name: Commit changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add .
        git commit -m "feat: ✨ Added New Solutions" || echo "No changes to commit"
        git push
